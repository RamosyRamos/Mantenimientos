<!DOCTYPE html>
<html lang="es" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Ramos y Ramos | Mantenimiento</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── TEMA OSCURO (por defecto) ── */
      :root, [data-theme="dark"] {
        --bg:       #09090e;
        --card:     #0f0f17;
        --line:     #1c1c2a;
        --text:     #e0d8cc;
        --sub:      #555555;
        --sub2:     #888888;
        --gold:     #C8A96E;
        --header:   #0d0d16;
        --datos:    #0c0c14;
        --inp-bg:   #0f0f17;
        --inp-text: #e0d8cc;
        --inp-ph:   #555555;
        --card-txt: #ccc;
      }

      /* ── TEMA CLARO ── */
      [data-theme="light"] {
        --bg:       #f2f0eb;
        --card:     #ffffff;
        --line:     #dedad4;
        --text:     #1a1a1a;
        --sub:      #777777;
        --sub2:     #999999;
        --gold:     #9a6f2e;
        --header:   #ffffff;
        --datos:    #f8f6f2;
        --inp-bg:   #ffffff;
        --inp-text: #1a1a1a;
        --inp-ph:   #aaaaaa;
        --card-txt: #444444;
      }

      body {
        background: var(--bg);
        color: var(--text);
        transition: background 0.2s, color 0.2s;
      }
      #root { min-height: 100vh; }

      /* Inputs heredan el tema */
      input, select, textarea {
        background: var(--inp-bg) !important;
        color: var(--inp-text) !important;
        border-color: var(--line) !important;
      }
      input::placeholder, textarea::placeholder {
        color: var(--inp-ph) !important;
      }
      select option {
        background: var(--inp-bg);
        color: var(--inp-text);
      }

      /* Botón de tema */
      .theme-toggle {
        margin-left: auto;
        padding: 5px 9px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--card);
        color: var(--sub);
        font-size: 15px;
        cursor: pointer;
        line-height: 1;
        transition: all 0.2s;
      }
      .theme-toggle:hover { opacity: 0.8; }

      /* Transiciones suaves */
      div, span, button, input, select, textarea {
        transition: background-color 0.15s, border-color 0.15s, color 0.15s;
      }

      /* ── OVERRIDES MODO CLARO para elementos con colores hardcodeados ── */
      [data-theme="light"] #root > div {
        background: var(--bg) !important;
      }

      /* Secciones principales */
      [data-theme="light"] div[style*="background:\"#0c0c14\""],
      [data-theme="light"] div[style*="background:\"#0c0c12\""],
      [data-theme="light"] div[style*="background:\"#0d0d16\""],
      [data-theme="light"] div[style*="background:\"#0f0f17\""],
      [data-theme="light"] div[style*="background:\"#09090e\""],
      [data-theme="light"] div[style*="background:\"#0c0c0c\""] {
        background: var(--card) !important;
      }

      /* Bordes */
      [data-theme="light"] div[style*="border:\"1px solid #1c1c2a\""],
      [data-theme="light"] div[style*="border-bottom:\"1px solid #1c1c2a\""] {
        border-color: var(--line) !important;
      }

      /* Textos grises oscuros → grises claros */
      [data-theme="light"] span[style*="color:\"#ccc\""],
      [data-theme="light"] span[style*="color:\"#bbb\""],
      [data-theme="light"] span[style*="color:\"#aaa\""],
      [data-theme="light"] div[style*="color:\"#ccc\""],
      [data-theme="light"] div[style*="color:\"#bbb\""],
      [data-theme="light"] div[style*="color:\"#888\""] {
        color: var(--text) !important;
      }

      /* Ítems del checklist — fondo por defecto */
      [data-theme="light"] div[style*="background:#0f0f17"] {
        background: #ffffff !important;
        border-color: var(--line) !important;
      }

      /* Grupos/secciones del checklist */
      [data-theme="light"] div[style*="background:\"#0c0c12\""] {
        background: #f5f4f0 !important;
      }

      /* Labels de sección */
      [data-theme="light"] div[style*="letterSpacing:3"] {
        color: var(--sub) !important;
      }

      /* Botones del checklist */
      [data-theme="light"] button[style*="background:transparent"] {
        background: #f0eeea !important;
      }

      /* Barra de progreso fondo */
      [data-theme="light"] div[style*="background:#1c1c2a"],
      [data-theme="light"] div[style*="background:\"#1c1c2a\""] {
        background: #dedad4 !important;
      }

      /* Dropdown buscador */
      [data-theme="light"] div[style*="background:\"#0f0f17\""][style*="zIndex:50"],
      [data-theme="light"] div[style*="background:\"#0c0c12\""][style*="zIndex"] {
        background: #ffffff !important;
        border-color: var(--line) !important;
      }

      /* Canvas firma */
      [data-theme="light"] div[style*="background:\"#0c0c14\""] canvas {
        background: #f5f4f0;
      }

      /* Notas textarea */
      [data-theme="light"] textarea {
        background: #ffffff !important;
        color: #1a1a1a !important;
        border-color: var(--line) !important;
      }

      /* Badges de código de servicio */
      [data-theme="light"] div[style*="background:\"#1a1a2a\""] {
        background: #eeecea !important;
      }

    </style>
    <script>
      // Restaurar tema guardado antes de que React cargue (evita flash)
      try {
        const saved = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', saved);
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
